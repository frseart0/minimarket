spring.application.name=minimarket
# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Configuracion de JWT (autenticacion sin estado)
# Clave secreta HMAC-SHA256 (>= 32 caracteres). En produccion debe venir de una variable de entorno.
jwt.secret=${JWT_SECRET:minimarket-plus-clave-secreta-super-segura-2026-duoc-uc}
# Tiempo de expiracion del token en milisegundos (1 hora)
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
